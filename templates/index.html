<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPENSE TRACKER</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='general.css') }}">
</head>

<body>
    <h1>
        EXPENSE TRACKER
    </h1>

    <h3>
        Fill out the following and press "Add" to add your expense to the list.
    </h3>

    <form action="/" method="POST">
        <div class="input-grid">
            <p>
                Expense Name
            </p>
            <p>
                Category
            </p>
            <p>
                Date
            </p>
            <p>
                Amount
            </p>
            <input class="input-bar" name="name" type="text" placeholder="Expense Name" required>
            <input class="input-bar" name="category" type="text" placeholder="Category" required>
            <input class="input-bar" name="date" type="date" placeholder="Date" required>
            <input class="input-bar" name="amount" type="number" placeholder="Amount" required>
        </div>
        <button class="add-button" name="action" value="add">Add</button>
    </form>

    <form action="/" method="POST">
        <!-- <button class="filter-button">
            <img src="{{ url_for('static', filename='images/options-outline.svg') }}" alt="Filter">
        </button>
        <select name="filter" id="">
            <option value="added">Added Date</option>
            <option value="name">Expense Name</option>
            <option value="category">Category</option>
            <option value="date">Date</option>
            <option value="amount">Amount</option>
        </select> -->
        <div class="expense-table">
            <table>
                <thead>
                    <th>Expense Name</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Amount</th>
                    <th>Action</th>
                </thead>
                <tbody>
                    {% if rows is not none %}
                    {% for row in rows %}
                    <tr>
                        <td>{{ row[1] }}</td>
                        <td>{{ row[2] }}</td>
                        <td>{{ row[3] }}</td>
                        <td>{{ row[4] }}</td>
                        
                        <td>
                                 <a href="{{ url_for('edit_expense', id=row[0]) }}">
                                    <button type="button">Edit</button>
                                </a>
                                <button class="delete-button" name="delete" value="{{ row[0] }}" type="submit">Delete</button></td>
                    </tr>
                    {% endfor %}
                    {% endif %}
                </tbody>
            </table>
        </div>
    </form>
</body>

</html>
